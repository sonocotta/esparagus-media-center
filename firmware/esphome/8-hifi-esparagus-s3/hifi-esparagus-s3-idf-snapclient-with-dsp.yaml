# ============================================================
# HiFi-Esparagus-S3 - Snapclient Configuration
# ============================================================
# ESP32 audio board with PCM5100 DAC, I2S output
# Configured as a Snapcast client for synchronized audio
# There are two implementations available, this on is 
# 2) snapclient with added DSP controls (farmed-switch fork of c-MM port)
#     Frequencies: 40, 50, 60, 70, 80, 90, 100, 110, 120, 130,
#                 140, 200, 315, 500, 800, 1250, 2000, 5000 Hz
#     Range: -15dB to +15dB per band
# Board-specific pinouts defined in substitutions
# Functional blocks imported from /packages
# ============================================================

substitutions:
  name: hifi-esparagus-s3
  friendly_name: Hifi-Esparagus-S3
  task_stack_in_psram: "true"

  # ===== Board-Specific Pinouts =====
  # I2S audio pins
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO14
  i2s_dout_pin: GPIO16
  
  # I2S microphone pins
  i2s_mic_lrclk_pin: GPIO18
  i2s_mic_bclk_pin: GPIO17
  i2s_mic_din_pin: GPIO8

  # RGB LED
  rgb_led_pin: GPIO9
  
  # IR Receiver
  ir_rx_pin: GPIO7

  # SPI pins (for display)
  spi_clk_pin: GPIO12
  spi_mosi_pin: GPIO11
  spi_miso_pin: GPIO13

  # Display control pins
  display_cs_pin: GPIO39
  display_dc_pin: GPIO40
  display_reset_pin: GPIO38

  # ===== Snapcast Server Configuration =====
  snapcast_server_ip: "192.168.1.49"
  snapcast_server_port: "1704"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.1.4
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio

esp32:
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      # Force using UART0 (pins 43, 44) instead of default USB-JTAG
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "n"
      CONFIG_ESP_CONSOLE_UART: "y"
      CONFIG_ESP_CONSOLE_UART_NUM: "0"

      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y" 

logger:
  baud_rate: 115200
  hardware_uart: UART0
  level: DEBUG

api:

ota:
  platform: esphome
  password: !secret esphome_ota_password

wifi:
  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false

network:
  enable_ipv6: true

# ===== Packages =====
packages:
  esparagus_remote:
    url: https://github.com/sonocotta/esparagus-media-center
    ref: main
    files:
      - firmware/esphome/packages/light.yaml
      - firmware/esphome/packages/ir-receiver.yaml
      - firmware/esphome/packages/monitoring.yaml
      - firmware/esphome/packages/monitoring-wifi.yaml
      - firmware/esphome/packages/snapclient-with-dsp.yaml

  # Debug/local development fallback:
  # light: !include packages/light.yaml
  # ir_receiver: !include packages/ir-receiver.yaml
  # monitoring: !include packages/monitoring.yaml
  # monitoring_wifi: !include packages/monitoring-wifi.yaml
  # snapclient_with_dsp: !include packages/snapclient-with-dsp.yaml
