# ============================================================
# HiFi-Esparagus-S3 - Voice-Assistant Configuration
# ============================================================
# ESP32 audio board with PCM5100 DAC, I2S output
# Configured as a Voice-Assistant 
# Features: Wake word detection, media player with ducking, RGB LED status
# Board-specific pinouts defined in substitutions
# Functional blocks imported from /packages
# ============================================================

substitutions:
  name: hifi-esparagus-s3
  friendly_name: Hifi-Esparagus-S3
  task_stack_in_psram: "true"

  # ===== Board-Specific Pinouts =====
  # I2S audio pins
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO14
  i2s_dout_pin: GPIO16
  
  # I2S microphone pins
  i2s_mic_lrclk_pin: GPIO18
  i2s_mic_bclk_pin: GPIO17
  i2s_mic_din_pin: GPIO8

  # RGB LED
  rgb_led_pin: GPIO9
  num_leds: 1

  # IR Receiver
  ir_rx_pin: GPIO7

  # SPI pins (for display)
  spi_clk_pin: GPIO12
  spi_mosi_pin: GPIO11
  spi_miso_pin: GPIO13

  # Display control pins
  display_cs_pin: GPIO39
  display_dc_pin: GPIO40
  display_reset_pin: GPIO38

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.2.1
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio

esp32:
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y" 

      CONFIG_ESP32_S3_BOX_BOARD: "y"
      # OPTIMIZED WiFi buffers for streaming
      CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM: "16"
      CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM: "32"
      CONFIG_TCPIP_RECVMBOX_SIZE: "512"
      CONFIG_TCP_SND_BUF_DEFAULT: "65535"
      CONFIG_TCP_WND_DEFAULT: "512000"
      CONFIG_TCP_RECVMBOX_SIZE: "512"
      # Audio priority
      CONFIG_FREERTOS_UNICORE: "n"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"

logger:
  level: INFO  # Changed from DEBUG to reduce overhead

ota:
  platform: esphome
  password: !secret esphome_ota_password

wifi:
  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password

api:

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false

network:
  enable_ipv6: true

# ===== Packages =====
packages:
  esparagus_remote:
    url: https://github.com/sonocotta/esparagus-media-center
    ref: main
    files:
      - firmware/esphome/packages/light-x.yaml
      - firmware/esphome/packages/monitoring.yaml
      - firmware/esphome/packages/monitoring-wifi.yaml

  esparagus_echo:
    url: https://github.com/sonocotta/esparagus-echo
    ref: features/voice-control-configs-refactoring
    files:
      - firmware/esphome/packages/audio.yaml
      - firmware/esphome/packages/microphone.yaml
      - firmware/esphome/packages/voice-assist-media-player.yaml
      - firmware/esphome/packages/voice-assist.yaml