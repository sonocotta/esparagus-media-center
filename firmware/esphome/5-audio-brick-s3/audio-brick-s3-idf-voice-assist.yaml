
# ============================================================
# Esparagus-Audio-Brick - Media Player Configuration
# ============================================================
# ESP32-S3 audio board with TAS5825M DAC (I2C+I2S) with built-in DSP
# Features: Wi-Fi media player with mixer/resampler,
#           announcements, RGB LED, IR receiver
# Board-specific pinouts defined in substitutions
# Functional blocks imported from /packages
# ============================================================

substitutions:
  name: esphome-web-2cbffc
  friendly_name: Esparagus-Audio-Brick
  task_stack_in_psram: "true"

  # ===== Board-Specific Pinouts =====
  # I2S audio pins
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO14
  i2s_dout_pin: GPIO16

  # I2S microphone pins
  i2s_mic_lrclk_pin: GPIO40
  i2s_mic_bclk_pin: GPIO41
  i2s_mic_din_pin: GPIO39
  i2s_mic_channel: left

  # TAS5825M
  tas58xx_variant: TAS5825M
  tas58xx_enable_pin: GPIO17
  i2c_sda_pin: GPIO8
  i2c_scl_pin: GPIO9

  # RGB LED
  rgb_led_pin: GPIO21
  num_leds: 1

  # SPI pins (for display)
  spi_clk_pin: GPIO12
  spi_mosi_pin: GPIO11
  spi_miso_pin: GPIO13
  
  # Display control pins
  display_cs_pin: GPIO47
  display_dc_pin: GPIO38
  display_reset_pin: GPIO48

  # Ethernet pins (if using ethernet instead of wifi)
  eth_cs_pin: GPIO10
  eth_interrupt_pin: GPIO6
  eth_reset_pin: GPIO5

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.1.4
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio

esp32:
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y" 

      CONFIG_ESP32_S3_BOX_BOARD: "y"
      # OPTIMIZED WiFi buffers for streaming
      CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM: "16"
      CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM: "32"
      CONFIG_TCPIP_RECVMBOX_SIZE: "512"
      CONFIG_TCP_SND_BUF_DEFAULT: "65535"
      CONFIG_TCP_WND_DEFAULT: "512000"
      CONFIG_TCP_RECVMBOX_SIZE: "512"
      # Audio priority
      CONFIG_FREERTOS_UNICORE: "n"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10"

logger:
  level: INFO  # Changed from DEBUG to reduce overhead

api:

ota:
  platform: esphome
  password: !secret esphome_ota_password

wifi:
  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false

network:
  enable_ipv6: true

# ===== Packages =====
packages:
  esparagus_remote:
    url: https://github.com/sonocotta/esparagus-media-center
    ref: main
    files:
      # Option A: TAS58xx configured with ganged 15-band EQ
      - firmware/esphome/packages/dac-tas58xx.yaml
      # Option B: TAS58xx configured with individual 15-band EQ per channel
      # - firmware/esphome/packages/dac-tas58xx-biamp.yaml
      # Option C: TAS58xx configured with bi-amp mode, with filters applied to both channels (HF or LF)
      # - firmware/esphome/packages/dac-tas58xx-presets.yaml

      - firmware/esphome/packages/light-x.yaml
      - firmware/esphome/packages/monitoring.yaml
      - firmware/esphome/packages/monitoring-wifi.yaml

  # Debug/local development fallback:
  microphone: !include packages/microphone.yaml
  audio: !include packages/audio-voice-assist.yaml
  audio_external_dac: !include packages/audio-addon-external-dac.yaml

  media_player: !include packages/media-player-voice-assist.yaml
  media_player_tas58xx: !include packages/media-player-addon-tas58xx.yaml
  media_player_dac_enable: !include packages/media-player-addon-dac-enable.yaml
  voice_assist: !include packages/voice-assist.yaml

