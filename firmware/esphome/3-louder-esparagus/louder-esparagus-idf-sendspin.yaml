# ============================================================
# Louder-Esparagus - Sendspin Configuration
# ============================================================
# ESP32 audio board with TAS5805M DAC (I2C+I2S) with built-in DSP
# Configured with Sendspin for synchronized multi-room audio
# Board-specific pinouts defined in substitutions
# Functional blocks imported from /packages
# ============================================================

substitutions:
  name: esphome-web-e0de84
  friendly_name: Louder-Esparagus
  task_stack_in_psram: "false"

  # ===== Board-Specific Pinouts =====
  # I2S Audio
  i2s_lrclk_pin: GPIO25
  i2s_bclk_pin: GPIO26
  i2s_dout_pin: GPIO22

  # TAS5805M
  tas58xx_variant: TAS5805M
  tas58xx_enable_pin: GPIO33
  i2c_sda_pin: GPIO21
  i2c_scl_pin: GPIO27

  # USB-PD enable pin
  pd_enable_pin: GPIO13

  # RGB LED
  rgb_led_pin: GPIO12

  # IR Receiver
  ir_rx_pin: GPIO39

  # Ethernet (W5500)
  eth_clk_pin: GPIO18
  eth_mosi_pin: GPIO23
  eth_miso_pin: GPIO19
  eth_cs_pin: GPIO05
  eth_interrupt_pin: GPIO35
  eth_reset_pin: GPIO14

  # OLED (SPI)
  spi_clk_pin: GPIO18
  spi_mosi_pin: GPIO23
  spi_miso_pin: GPIO19
  display_cs_pin: GPIO15
  display_dc_pin: GPIO04
  display_reset_pin: GPIO32

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.12.2
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio

esp32:
  variant: esp32
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    advanced:
      minimum_chip_revision: "3.1" 
    sdkconfig_options:
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"

logger:
  level: DEBUG

api:

ota:
  platform: esphome
  password: !secret esphome_ota_password

wifi:
  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password

psram:
  speed: 80MHz

network:
  enable_ipv6: true
  
http_request:

# ===== Packages =====
packages:
  # esparagus_remote:
  #   url: https://github.com/sonocotta/esparagus-media-center
  #   ref: main
  #   files:
  #     # Option A: no OLED connected
  #     - firmware/esphome/packages/sendspin-tas5805m.yaml
  #     # Option B: OLED displays clock when idling, and track/artist info when playing
  #     # - firmware/esphome/packages/sendspin-tas5805m-with-oled.yaml
  #     # - firmware/esphome/packages/oled-sendspin.yaml

  #     - firmware/esphome/packages/dac-tas5805m.yaml
  #     - firmware/esphome/packages/sendspin-audio-external-dac.yaml
  #     - firmware/esphome/packages/light.yaml
  #     - firmware/esphome/packages/pd-enable.yaml
  #     - firmware/esphome/packages/ir-receiver.yaml
  #     - firmware/esphome/packages/monitoring.yaml
  #     # Optional ethernet (replace wifi config if you use this)
  #     # - firmware/esphome/packages/ethernet-w5500.yaml

  # Debug/local development fallback:
  external_dac: !include packages/dac-tas58xx.yaml
  # external_dac: !include packages/dac-tas58xx-biamp.yaml
  # external_dac: !include packages/dac-tas58xx-presets.yaml
  sendspin_audio: !include packages/sendspin-audio.yaml
  sendspin_external_dac: !include packages/sendspin-audio-addon-external-dac.yaml
  sendspin: !include packages/sendspin.yaml
  sendspin_enable_dac: !include packages/sendspin-addon-dac-enable.yaml
  sendspin_tas58xx: !include packages/sendspin-addon-tas58xx.yaml
  oled: !include packages/sendspin-addon-oled.yaml
  light: !include packages/light.yaml
  pd_enable: !include packages/pd-enable.yaml
  ir_receiver: !include packages/ir-receiver.yaml
  # ethernet: !include packages/ethernet-w5500.yaml
  monitoring: !include packages/monitoring.yaml