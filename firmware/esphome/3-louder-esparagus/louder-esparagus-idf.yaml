
# ============================================================
# Louder-Esparagus - Media Player Configuration
# ============================================================
# ESP32 audio board with TAS5805M DAC (I2C+I2S) with built-in DSP
# Features: Wi-Fi media player with mixer/resampler,
#           announcements, RGB LED, IR receiver
# Board-specific pinouts defined in substitutions
# Functional blocks imported from /packages
# ============================================================

substitutions:
  name: esphome-web-e0de84
  friendly_name: Louder-Esparagus
  task_stack_in_psram: "false"

  # ===== Board-Specific Pinouts =====
  # I2S Audio
  i2s_lrclk_pin: GPIO25
  i2s_bclk_pin: GPIO26
  i2s_dout_pin: GPIO22

  # TAS5805M
  tas58xx_variant: TAS5805M
  tas58xx_enable_pin: GPIO33
  i2c_sda_pin: GPIO21
  i2c_scl_pin: GPIO27

  # ===== DAC Overrides (optional) =====
  # tas58xx_dac_mode: PBTL 
  # tas58xx_mixer_mode: MONO
  # tas58xx_analog_gain: 0db
  # tas58xx_volume_max: 0dB
  # tas58xx_volume_min: -60dB
  
  # USB-PD enable pin
  pd_enable_pin: GPIO13

  # RGB LED
  rgb_led_pin: GPIO12
  num_leds: 8

  # IR Receiver
  ir_rx_pin: GPIO39

  # SPI pins (for display and ethernet)
  spi_clk_pin: GPIO18
  spi_mosi_pin: GPIO23
  spi_miso_pin: GPIO19

  # Ethernet (W5500)
  eth_cs_pin: GPIO05
  eth_interrupt_pin: GPIO35
  eth_reset_pin: GPIO14

  # OLED (SPI)
  display_cs_pin: GPIO15
  display_dc_pin: GPIO04
  display_reset_pin: GPIO32

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.12.2
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio

esp32:
  variant: esp32
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    advanced:
      minimum_chip_revision: "3.1" 
    sdkconfig_options:
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"

logger:
  level: DEBUG

api:

ota:
  platform: esphome
  password: !secret esphome_ota_password

wifi:
  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password

psram:
  speed: 80MHz

network:
  enable_ipv6: true

# ===== Packages =====
packages:
  esparagus_remote:
    url: https://github.com/sonocotta/esparagus-media-center
    ref: main
    files:
      # Option A: TAS58xx configured with ganged 15-band EQ
      - firmware/esphome/packages/dac-tas58xx.yaml
      # Option B: TAS58xx configured with individual 15-band EQ per channel
      # - firmware/esphome/packages/dac-tas58xx-biamp.yaml
      # Option C: TAS58xx configured with bi-amp mode, with filters applied to both channels (HF or LF)
      # - firmware/esphome/packages/dac-tas58xx-presets.yaml

      - firmware/esphome/packages/audio.yaml
      - firmware/esphome/packages/audio-addon-external-dac.yaml
      - firmware/esphome/packages/media-player.yaml
      - firmware/esphome/packages/media-player-addon-dac-enable.yaml
      - firmware/esphome/packages/media-player-addon-tas58xx.yaml

      - firmware/esphome/packages/light-x.yaml
      - firmware/esphome/packages/ir-receiver.yaml
      - firmware/esphome/packages/pd-enable.yaml
      - firmware/esphome/packages/monitoring.yaml
      - firmware/esphome/packages/monitoring-wifi.yaml
      - firmware/esphome/packages/oled.yaml
      # Optional ethernet (replace wifi config if you use this, you need to exclude OLED package if you do this to free up SPI bus)
      # - firmware/esphome/packages/ethernet-w5500.yaml

  # # Debug/local development fallback:
  # external_dac: !include packages/dac-tas58xx.yaml
  # # external_dac: !include packages/dac-tas58xx-biamp.yaml
  # # external_dac: !include packages/dac-tas58xx-presets.yaml
  
  # audio: !include packages/audio.yaml
  # audio_external_dac: !include packages/audio-addon-external-dac.yaml
  # media_player: !include packages/media-player.yaml
  # media_player_dac_enable: !include packages/media-player-addon-dac-enable.yaml
  # media_player_tas5805m: !include packages/media-player-addon-tas58xx.yaml

  # light: !include packages/light-x.yaml
  # ir_receiver: !include packages/ir-receiver.yaml
  # pd_enable: !include packages/pd-enable.yaml
  # monitoring: !include packages/monitoring.yaml
  # monitoring_wifi: !include packages/monitoring-wifi.yaml
  # oled: !include packages/oled.yaml
  # # ethernet: !include packages/ethernet-w5500.yaml