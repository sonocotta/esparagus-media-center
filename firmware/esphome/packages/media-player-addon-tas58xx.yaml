# ============================================================
# Media Player - TAS58XX addon
# ============================================================
# Extends media-player.yaml with TAS58XX-specific behavior:
# - startup sync sound registration
# - DAC enable on playback/announcement
# - announcement volume via external_dac API
# - DAC idle shutdown and overtemp volume throttling
# Dependencies: media-player.yaml, dac-tas58xx.yaml,
#               media-player-addon-dac-enable.yaml
# ============================================================

# Important! Play sound on boot required for DAC to capture clock signal and enable DSP configuration
# If any of the DSP configs are sent before clock signal, they are simply ignored. This applies to EQ and Mixer controls
esphome:
  on_boot:
    priority: 220.0
    then:
      media_player.speaker.play_on_device_media_file: startup_sync_sound

media_player:
  - id: !extend external_media_player

    files:
      id: startup_sync_sound
      file: https://github.com/mrtoy-me/esphome-tas58xx/raw/main/components/tas58x/silent_boot.flac
      # For debuging purposes, you can use a sound with audible content
      # file: https://github.com/mrtoy-me/esphome-tas58xx/raw/main/components/tas58xx/tas58xx_boot.flac

    on_announcement:
      - if:
          condition:
            - lambda: return (!id(announcement_triggered));
          then:
            - lambda: |-
                id(announcement_triggered) = true;
                id(current_volume) = id(external_dac).volume();
            - light.turn_on:
                id: rgb_front_led
                blue: 100%
                red: 0%
                green: 100%
                brightness: 50%
            - mixer_speaker.apply_ducking:
                  id: media_spk_mixer_input
                  decibel_reduction: 40
                  duration: 0.0s
            - wait_until:
                media_player.is_announcing: external_media_player
            - delay: 0.75s
            - lambda: id(external_dac).set_volume(id(announce_volume).state / 100);
            - wait_until:
                - not:
                    media_player.is_announcing: external_media_player
            - mixer_speaker.apply_ducking:
                      id: media_spk_mixer_input
                      decibel_reduction: 0
                      duration: 1.0s
            - lambda: id(external_dac).set_volume(id(current_volume));
            - light.turn_off:
                id: rgb_front_led
            - lambda: id(announcement_triggered) = false;

### Send DAC to shutdown mode after 2 minutes of inactivity
# This is to save power, since DAC will draw under 100mA in idle state
interval:
  - interval: 30s
    then:
      - if:
          condition:
            - switch.is_on: enable_dac
            - for:
                time: 120s
                condition:
                  or:
                    - media_player.is_idle: external_media_player
                    - media_player.is_paused: external_media_player
          then:
            - switch.turn_off: enable_dac
            
  # Optional: when DAC reports overheating warning, reduce volume to prevent shutdown
  - interval: 1s
    then:
      - if:
          condition:
            - binary_sensor.is_on: over_temperature_warning
            - lambda: 'return (id(external_media_player).volume != 0.0f);'
            - lambda: 'return !(id(external_media_player).is_muted());'
          then:
            - media_player.volume_down