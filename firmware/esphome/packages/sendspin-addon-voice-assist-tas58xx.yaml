# ============================================================
# Sendspin - TAS58XX addon
# ============================================================
# Extends sendspin.yaml with TAS58XX-specific behavior:
# - startup sync file source
# - boot-time startup sync playback
# - DAC enable/disable hooks for playback events
# Dependencies: sendspin.yaml, audio-addon-external-dac.yaml,
#               sendspin-addon-dac-enable.yaml
# ============================================================

# Important! Play sound on boot required for DAC to capture clock signal and enable DSP configuration
# If any of the DSP configs are sent before clock signal, they are simply ignored. This applies to EQ and Mixer controls
esphome:
  on_boot:
    priority: 220.0
    then:
      media_player.play_media:
        id: external_media_player
        media_url: audio-file://wake_word_triggered_sound