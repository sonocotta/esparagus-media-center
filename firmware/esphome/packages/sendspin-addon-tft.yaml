# We're caching pixel lengths of strings here, as it's unclear
# how expensive those string calculations are every screen raster
globals:
  - id: title_length
    type: int
    restore_value: no
    initial_value: '0'
  - id: artist_length
    type: int
    restore_value: no
    initial_value: '0'
  - id: album_length
    type: int
    restore_value: no
    initial_value: '0'
  - id: progress_length
    type: int
    restore_value: no
    initial_value: '0'

script:
  - id: hide_media_controls
    mode: restart  # Restart the timer if called again
    then:
      - delay: 5s
      - lvgl.widget.hide: media_controls_overlay
      - logger.log: "Hiding media controls"

lvgl:
  displays:
    - s3_box_lcd
  rotation: 180
  buffer_size: 25%
  color_depth: 16
  bg_color: 0x000000
  default_font: font_display
  top_layer:
    widgets:
      # Media controls overlay (initially hidden) - works on all pages
      - obj:
          id: media_controls_overlay
          align: TOP_MID
          width: 320
          height: 80
          bg_color: 0x000000
          bg_opa: 60%  # Semi-transparent background
          border_width: 0
          radius: 10
          scrollbar_mode: "OFF"  # Hide scrollbars
          scrollable: false  # Disable scrolling completely
          hidden: true  # Initially hidden
          widgets:
            # Previous button - doesn't currently work with current media player
            - button:
                id: prev_button
                align: LEFT_MID
                x: 40
                width: 70
                height: 70
                bg_color: 0x404040
                bg_opa: 70%
                radius: 35
                on_click:
                  - media_player.previous: sendspin_group_media_player
                  - logger.log: "Previous button pressed"
                  - script.stop: hide_media_controls
                  - script.execute: hide_media_controls
                widgets:
                  - label:
                      align: CENTER
                      text: "\U000F04AE"  # mdi:skip-previous
                      text_color: 0xFFFFFF
                      text_font: font_mdi

            # Play/Pause button
            - button:
                id: play_pause_button
                align: CENTER
                width: 70
                height: 70
                bg_color: 0x404040
                bg_opa: 70%
                radius: 35
                on_click:
                  - media_player.toggle: sendspin_group_media_player
                  - logger.log: "Play/Pause button pressed"
                  - lambda: |-
                      // Optimistically toggle the icon for immediate feedback
                      const char* current_text = lv_label_get_text(id(play_pause_icon));
                      if (strcmp(current_text, "${mdi_pause_glyph}") == 0) {
                        lv_label_set_text(id(play_pause_icon), "${mdi_play_glyph}");
                      } else {
                        lv_label_set_text(id(play_pause_icon), "${mdi_pause_glyph}");
                      }
                  - delay: ${optimistic_state_correction_delay}
                  - lambda: |-
                      // After delay, ensure icon matches actual state
                      if (id(sendspin_group_media_player)->state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING) {
                        lv_label_set_text(id(play_pause_icon), "${mdi_pause_glyph}");
                      } else {
                        lv_label_set_text(id(play_pause_icon), "${mdi_play_glyph}");
                      }
                  - script.stop: hide_media_controls
                  - script.execute: hide_media_controls
                widgets:
                  - label:
                      id: play_pause_icon
                      align: CENTER
                      text: "\U000F03E4"  # mdi:pause (default)
                      text_color: 0xFFFFFF
                      text_font: font_mdi

            # Next button - doesn't currently work with current media player
            - button:
                id: next_button
                align: RIGHT_MID
                x: -40
                width: 70
                height: 70
                bg_color: 0x404040
                bg_opa: 70%
                radius: 35
                on_click:
                  - media_player.next: sendspin_group_media_player
                  - logger.log: "Next button pressed"
                  - script.stop: hide_media_controls
                  - script.execute: hide_media_controls
                widgets:
                  - label:
                      align: CENTER
                      text: "\U000F04AD"  # mdi:skip-next
                      text_color: 0xFFFFFF
                      text_font: font_mdi

  pages:
    - id: idle_page
      bg_color: 0x000000
      skip: true
      on_swipe_right:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.next:
            animation: OUT_RIGHT
            time: 300ms
        - logger.log: "Swiped right"
      on_swipe_left:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.previous:
            animation: OUT_LEFT
            time: 300ms
        - logger.log: "Swiped left"
      widgets:
        - label:
            id: idle_label
            align: CENTER
            text: "Sendspin Player"
            text_color: 0xFFFFFF
            text_font: font_display
            clickable: true
            on_click:
              - lvgl.page.show: sendspin_page
        - obj:
            id: touch_capture_idle
            x: 0
            y: 0
            width: 320
            height: 240
            bg_opa: TRANSP
            border_opa: TRANSP
            clickable: true
            on_click:
              - lambda: |-
                  if (id(sendspin_group_media_player)->state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING) {
                    lv_label_set_text(id(play_pause_icon), "\U000F03E4");
                  } else {
                    lv_label_set_text(id(play_pause_icon), "\U000F040A");
                  }
              - lvgl.widget.show: media_controls_overlay
              - logger.log: "Showing media controls"
              - script.execute: hide_media_controls

    - id: sendspin_page
      bg_color: 0x000000
      scrollbar_mode: "OFF"  # Hide scrollbars on main page
      on_swipe_right:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.next:
            animation: OUT_RIGHT
            time: 300ms
        - logger.log: "Swiped right"
      on_swipe_left:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.previous:
            animation: OUT_LEFT
            time: 300ms
        - logger.log: "Swiped left"
      widgets:
        - image:
            id: album_art_widget
            align: TOP_MID
            src: sendspin_cover_art
            height: 200
            width: 200
            antialias: true  # Better quality when scaling
            clickable: false
        - obj:
            id: track_info_container
            x: 0
            y: 200
            width: 320
            height: 40
            bg_color: 0x000000
            border_width: 0
            pad_all: 0
            scrollbar_mode: "OFF"  # Hide scrollbars
            clickable: false
            widgets:
              - label:
                  id: now_playing_label
                  align: CENTER
                  text_color: 0xFFFFFF
                  text_font: font_display
                  text: ""
                  width: 300  # Slightly less than container width for padding
                  long_mode: SCROLL_CIRCULAR  # Continuously scroll text that doesn't fit
        # Track progress time (left of album art)
        - label:
            id: track_progress_label
            x: 0
            y: 178
            width: 60
            height: 20
            text_align: CENTER
            text_color: 0xAAAAAA
            text_font: font_time
            text: ""
        # Track duration time (right of album art)
        - label:
            id: track_duration_label
            x: 260
            y: 178
            width: 60
            height: 20
            text_align: CENTER
            text_color: 0xAAAAAA
            text_font: font_time
            text: ""
        - obj:
            id: touch_capture
            x: 0
            y: 0
            width: 320
            height: 240
            bg_opa: TRANSP
            border_opa: TRANSP
            clickable: true
            on_click:
              - lambda: |-
                  if (id(sendspin_group_media_player)->state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING) {
                    lv_label_set_text(id(play_pause_icon), "\U000F03E4");
                  } else {
                    lv_label_set_text(id(play_pause_icon), "\U000F040A");
                  }
              - lvgl.widget.show: media_controls_overlay
              - logger.log: "Showing media controls"
              - script.execute: hide_media_controls

    - id: sendspin_artist_page
      bg_color: 0x000000
      scrollbar_mode: "OFF"  # Hide scrollbars on main page
      on_swipe_right:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.next:
            animation: OUT_RIGHT
            time: 300ms
        - logger.log: "Swiped right"
      on_swipe_left:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.previous:
            animation: OUT_LEFT
            time: 300ms
        - logger.log: "Swiped left"
      widgets:
        - image:
            id: artist_picture_widget
            align: TOP_MID
            src: sendspin_artist_picture
            height: 200
            width: 200
            antialias: true  # Better quality when scaling
            clickable: true
        - obj:
            id: touch_capture_artist
            x: 0
            y: 0
            width: 320
            height: 240
            bg_opa: TRANSP
            border_opa: TRANSP
            clickable: true
            on_click:
              - lambda: |-
                  if (id(sendspin_group_media_player)->state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING) {
                    lv_label_set_text(id(play_pause_icon), "\U000F03E4");
                  } else {
                    lv_label_set_text(id(play_pause_icon), "\U000F040A");
                  }
              - lvgl.widget.show: media_controls_overlay
              - logger.log: "Showing media controls"
              - script.execute: hide_media_controls

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    id: home_button
    on_press:
      - lvgl.page.show: idle_page
      - logger.log: "Home button pressed"