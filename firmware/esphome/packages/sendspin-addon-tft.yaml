text_sensor:
  - platform: sendspin
    id: track_title
    type: title
    on_value:
      - lambda: |-
          lv_label_set_text(id(track_progress_label), "");
      - component.update: now_playing_text
  - platform: sendspin
    id: album_title
    type: album
  - platform: sendspin
    id: track_artist
    type: artist
    on_value:
      - component.update: now_playing_text
  # - platform: sendspin
  #   id: album_year
  #   type: year
  # - platform: sendspin
  #   id: track_number
  #   type: track
  - platform: template
    id: now_playing_text
    lambda: |-
      std::string playing_text = id(track_title).get_state();
      if (!id(track_artist).get_state().empty()) {
        if (!playing_text.empty()) {
          playing_text += " - ";
        }
        playing_text += id(track_artist).get_state();
      }
      return playing_text;
    on_value:
      - lvgl.label.update: 
          id: now_playing_label
          text: !lambda return x;
    update_interval: never

sensor:
  - platform: sendspin
    type: track_duration
    id: ss_track_duration
    on_value:
      # If the duration has changed, reset the progress bar length
      - globals.set: 
          id: progress_length
          value: '0'

  - platform: sendspin
    type: track_progress
    id: ss_track_progress
    on_value:
      # Do the calculation on the pixel size of the progress bar, having
      # made sure there's a duration to compare against, and it's not too
      # large.  Can't check it's just the wrong one.
      - globals.set: 
          id: progress_length
          value: !lambda |-
            if (x > id(ss_track_duration).state) {
              return 0;
            } else if (id(ss_track_duration).state > 0.0) {
              uint32_t tmp = floor(x);
              tmp *= 128;
              return int(tmp/id(ss_track_duration).state);
            } else {
              return 0;
            }

output:
  - platform: ledc
    pin: ${display_backlight_pin}
    id: backlight_output

light:
  - platform: monochromatic
    id: led
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms

