# ============================================================
# OLED display - Shows simple clock using the SH1106 128x64 OLED connected via SPI
# ============================================================
# Requires substitutions:
#   - spi_clk_pin
#   - spi_mosi_pin
#   - spi_miso_pin
#   - display_cs_pin
#   - display_dc_pin
#   - display_reset_pin
# ============================================================

defaults:
  font_small: 24
  font_family: Roboto
  font_glyphsets: "GF_Latin_Core"
  display_model: ILI9341

substitutions:

  mdi_pause_glyph: \U000F03E4
  mdi_play_glyph: \U000F040A
  mdi_skip_previous_glyph: \U000F04AE
  mdi_skip_next_glyph: \U000F04AD

  # Time to wait before verifying optimistic state changes match actual state
  optimistic_state_correction_delay: 1000ms

external_components:
  - source: github://pr#16057
    components: [ generic_image, sendspin ]
    refresh: 1h

media_player:
  - id: !extend sendspin_group_media_player

    on_play:
      # Update play/pause icon
      - lambda: lv_label_set_text(id(play_pause_icon), "${mdi_pause_glyph}");
      - if:
          condition:
            lvgl.page.is_showing: idle_page
          then:
            - lvgl.page.show: 
                id: sendspin_page
                animation: FADE_IN
                time: 300ms
    on_pause:
      # Update play/pause icon
      - lambda: lv_label_set_text(id(play_pause_icon), "${mdi_play_glyph}");
    on_idle:
      # Update play/pause icon
      - lambda: lv_label_set_text(id(play_pause_icon), "${mdi_play_glyph}");
      - if:
          condition:
            not:
              lvgl.page.is_showing: idle_page
          then:
            - lvgl.page.show: 
                id: idle_page
                animation: FADE_OUT
                time: 300ms

