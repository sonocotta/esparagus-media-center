# ============================================================
# TAS5805M/TAS5825M DAC - I2C Control, EQ, and Fault Monitoring
# ============================================================
# Requires substitutions:
#   - tas58xx_enable_pin
#   - i2c_sda_pin
#   - i2c_scl_pin
#
# Optional substitutions (override in main config to change defaults):
#   - tas58xx_dac_mode:    BTL (default) or PBTL
#   - tas58xx_modulation:  BD_MODE (default) or 1SPW_MODE
#   - tas58xx_mixer_mode:  STEREO (default), STEREO_INVERSE, MONO, LEFT, RIGHT
#   - tas58xx_analog_gain: 0db (default)
#   - tas58xx_volume_max:  0dB (default)
#   - tas58xx_volume_min:  -60dB (default)
#   - tas58xx_refresh_eq:  AUTO (default)
# ============================================================

# substitutions:
#   tas58xx_dac_mode: BTL        # 'BTL' / Bridge Tied Load - 2Ch Stereo, or 'PBTL' / Parallel Bridge Tied Load - 1Ch Mono (double power)
#   tas58xx_modulation: BD_MODE  # 'BD_MODE' default and for VCC 12V or less, or '1SPW_MODE' consider more power efficiency for VCC >12V
#   tas58xx_mixer_mode: STEREO   # STEREO, STEREO_INVERSE, MONO, LEFT, RIGHT
#   tas58xx_analog_gain: 0db     # Startup Gain or Output voltage swing
#   tas58xx_volume_max: 0dB      # Max HA volume mapping to Digital Volume control
#   tas58xx_volume_min: -60dB    # Min HA volume mapping to Digital Volume control
#   tas58xx_refresh_eq: AUTO     # AUTO applicable when audio playback triggered at boot, MANUAL requires to trigger EQ refresh with automation
#   tas58xx_branch: main         # Branch of the esphome-tas58xx component to use, default to 'main' for stable code
#   tas58xx_dac_restore_mode: ALWAYS_ON  

external_components:
  - source: github://mrtoy-me/esphome-tas58xx@dev
    components: [tas58xx]
    refresh: 12h

i2c:
  sda: ${i2c_sda_pin}
  scl: ${i2c_scl_pin}
  frequency: 400kHz
  scan: true

audio_dac:
  - platform: tas58xx
    address: 0x4c
    id: external_dac

    tas58xx_dac: ${tas58xx_variant}     
    enable_pin: ${tas58xx_enable_pin}   
    dac_mode: BTL                       
    mixer_mode: STEREO                  
    analog_gain: -9db                   
    volume_max: 0db                     
    volume_min: -60db                   
    update_interval: 5s                 

  - platform: tas58xx
    address: 0x4d
    id: external_dac_secondary

    tas58xx_dac: ${tas58xx_variant}     
    enable_pin: ${tas58xx_enable_pin_secondary}   
    dac_mode: PBTL                      
    mixer_mode: MONO                    
    analog_gain: 0db                    
    volume_max: 0db                     
    volume_min: -60db                   
    update_interval: 5s                

switch:
  - platform: tas58xx
    tas58xx_id: external_dac
    enable_dac:
      name: Enable Main
      id: sw_external_dac_main
      restore_mode: ALWAYS_ON

  - platform: tas58xx
    tas58xx_id: external_dac_secondary
    enable_dac:
      name: Enable Sub
      id: sw_external_dac_secondary
      restore_mode: ALWAYS_ON
      
select:
  - platform: tas58xx
    tas58xx_id: external_dac
    mixer_mode:
      name: _Mixer Mode Main
      id: sel_external_dac_main
    eq_mode:
      name: EQ Mode Main
      id: sel_eq_mode_main

  - platform: tas58xx
    tas58xx_id: external_dac_secondary
    mixer_mode:
      name: _Mixer Mode Sub
      id: sel_external_dac_secondary
    eq_mode:
      name: EQ Mode Sub
      id: sel_eq_mode_secondary
    eq_preset_left_channel:
      id: _eq_preset_left_channel_secondary
      name: EQ Preset Cutoff Sub

number:
  - platform: tas58xx
    tas58xx_id: external_dac_secondary
    channel_volume_left:
      name: _Volume Sub

  - platform: tas58xx
    tas58xx_id: external_dac
    channel_volume_left:
      name: _Volume Left
    channel_volume_right:
      name: _Volume Right

    # new names for left and right eq gains
    left_eq_gain_20Hz:
      name: Left ---20Hz
    left_eq_gain_31.5Hz:
      name: Left ---31.5Hz
    left_eq_gain_50Hz:
      name: Left ---50Hz
    left_eq_gain_80Hz:
      name: Left ---80Hz
    left_eq_gain_125Hz:
      name: Left --125Hz
    left_eq_gain_200Hz:
      name: Left --200Hz
    left_eq_gain_315Hz:
      name: Left --315Hz
    left_eq_gain_500Hz:
      name: Left --500Hz
    left_eq_gain_800Hz:
      name: Left --800Hz
    left_eq_gain_1250Hz:
      name: Left -1250Hz
    left_eq_gain_2000Hz:
      name: Left -2000Hz
    left_eq_gain_3150Hz:
      name: Left -3150Hz
    left_eq_gain_5000Hz:
      name: Left -5000Hz
    left_eq_gain_8000Hz:
      name: Left -8000Hz
    left_eq_gain_16000Hz:
      name: Left 16000Hz

### Faults clear registers read from TAS58XX
# sensor:
#   - platform: tas58xx
#     faults_cleared:
#       name: "Times Faults Cleared"

### Faults registers read directly from TAS58XX
binary_sensor:
  - platform: tas58xx
    tas58xx_id: external_dac
    have_fault:
      name: Any Faults (main)
      exclude: CLOCK_FAULT
    left_channel_dc_fault:
      name: Left Channel DC Fault (main)
    right_channel_dc_fault:
      name: Right Channel DC Fault (main)
    left_channel_over_current:
      name: Left Channel Over Current (main)
    right_channel_over_current:
      name: Right Channel Over Current (main)
    otp_crc_check:
      name: CRC Check Fault (main)
    bq_write_failed:
      name: BQ Write Failure (main)
    # I2S clock fault binary sensor is not really useful with speaker media player
    # since it generates clock faults when it manipulates I2S.
    # clock fault:
    #   name: I2S Clock Fault
    pcdd_over_voltage:
      name: PCDD Over Voltage (main)
    pcdd_under_voltage:
      name: PCDD Under Voltage (main)
    over_temp_shutdown:
      name: Over Temperature Shutdown Fault (main)
    over_temp_warning:
      name: Over Temperature Warning (main)
      id: over_temperature_warning

  - platform: tas58xx
    tas58xx_id: external_dac_secondary
    have_fault:
      name: Any Faults (sub)
      exclude: CLOCK_FAULT
    left_channel_dc_fault:
      name: Left Channel DC Fault (sub)
    right_channel_dc_fault:
      name: Right Channel DC Fault (sub)
    left_channel_over_current:
      name: Left Channel Over Current (sub)
    right_channel_over_current:
      name: Right Channel Over Current (sub)
    otp_crc_check:
      name: CRC Check Fault (sub)
    bq_write_failed:
      name: BQ Write Failure (sub)
    # I2S clock fault binary sensor is not really useful with speaker media player
    # since it generates clock faults when it manipulates I2S.
    # clock fault:
    #   name: I2S Clock Fault
    pcdd_over_voltage:
      name: PCDD Over Voltage (sub)
    pcdd_under_voltage:
      name: PCDD Under Voltage (sub)
    over_temp_shutdown:
      name: Over Temperature Shutdown Fault (sub)
    over_temp_warning:
      name: Over Temperature Warning (sub)
      id: over_temperature_warning_sub