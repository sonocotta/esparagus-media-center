# ============================================================
# Audio-Brick-Dual-S3 - Media Player Configuration
# ============================================================
# ESP32 audio board with 2x TAS5825M DAC (I2C+I2S) with built-in DSP
# ============================================================

substitutions:
  name: esphome-web-e349e4
  friendly_name: Audio-Brick-Dual-S3
  task_stack_in_psram: "true" 

  # ===== Board-Specific Pinouts =====
  # I2S audio pins
  i2s_lrclk_pin: GPIO15
  i2s_bclk_pin: GPIO14
  i2s_dout_pin: GPIO16

  # TAS5825M MAIN DAC
  tas58xx_variant: TAS5825M
  tas58xx_enable_pin: GPIO18
  i2c_sda_pin: GPIO8
  i2c_scl_pin: GPIO9

  # TAS5825M SECONDARY DAC
  tas58xx_enable_pin_secondary: GPIO17

  # ===== DAC Overrides (optional) =====
  # tas58xx_dac_mode: PBTL 
  # tas58xx_mixer_mode: MONO
  # tas58xx_analog_gain: 0db
  # tas58xx_volume_max: 0dB
  # tas58xx_volume_min: -60dB
  
  # RGB LED
  rgb_led_pin: GPIO21

  # SPI pins (for display)
  spi_clk_pin: GPIO12
  spi_mosi_pin: GPIO11
  spi_miso_pin: GPIO13
  
  # Display control pins
  display_cs_pin: GPIO47
  display_dc_pin: GPIO38
  display_reset_pin: GPIO48
  display_backlight_pin: GPIO2

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.5.0
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio

esp32:
  variant: ESP32S3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      # Moves instructions and read only data from flash into PSRAM on boot.
      # Both enabled allows instructions to execute while a flash operation is in progress without needing to be placed in IRAM.
      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y" 

logger:
  level: DEBUG

api:

ota:
  platform: esphome
  password: !secret esphome_ota_password

wifi:
  ssid: !secret esphome_wifi_ssid
  password: !secret esphome_wifi_password

psram:
  mode: octal
  speed: 80MHz

  
  ignore_not_found: false

network:
  enable_ipv6: true

# ===== Packages =====
packages:
  esparagus_remote:
    url: https://github.com/sonocotta/esparagus-media-center
    ref: main
    files:
      - firmware/esphome/packages/audio.yaml
      - firmware/esphome/packages/audio-addon-external-dac.yaml

      - firmware/esphome/packages/sendspin.yaml
      - firmware/esphome/packages/sendspin-addon-tas58xx.yaml
      # - firmware/esphome/packages/sendspin-addon-tft.yaml

      - firmware/esphome/packages/light.yaml
      - firmware/esphome/packages/monitoring.yaml
      - firmware/esphome/packages/monitoring-wifi.yaml

  # Debug/local development fallback:
  dacs: !include ../packages/dac-tas58xx-dual.yaml
  media_player_addon_dac_enable: !include ../packages/media-player-addon-dac-enable-dual.yaml

  tft: !include ../packages/sendspin-addon-tft.yaml
  
